name: Bug report
description: Report a problem with PokeBuddy CLI
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PokeBuddy version
      placeholder: "0.1.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. See ...
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
