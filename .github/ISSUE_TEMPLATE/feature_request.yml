name: Feature request
description: Suggest an idea for PokeBuddy CLI
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
  - type: textarea
    id: shape
    attributes:
      label: Suggested command or API
      render: shell
